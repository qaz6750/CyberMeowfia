name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ANDROID_API: "29"
  IONSTACK_ANDROID_API: "35"
  NDK_VERSION: "27.2.12479018"

jobs:
  build-futex-poc:
    name: Build Android arm64 artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;${NDK_VERSION}"

      - name: Build futex reproduction PoC
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: bash scripts/ci-build-futex-poc.sh

      - name: Build IonStack preload targets
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: bash scripts/ci-build-ionstack-exploit-targets.sh

      - name: Upload futex PoC artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostlock-poc-arm64
          path: build/ghostlock-poc-arm64
          if-no-files-found: error
          retention-days: 7

      - name: Upload IonStack preload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ionstack-preload-arm64-all-targets
          path: |
            IonStack/CVE-2026-43499/exploit/build/*/bin/preload.so
            IonStack/CVE-2026-43499/exploit/build/ionstack-preload-sha256sums.txt
          if-no-files-found: error
          retention-days: 7
