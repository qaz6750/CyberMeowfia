name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ANDROID_API: "29"
  IONSTACK_ANDROID_API: "35"
  IONSTACK_PROJECT: "blazer-CP2A.260605.012"
  NDK_VERSION: "27.2.12479018"

jobs:
  build-futex-poc:
    name: Build futex PoC for Android arm64
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;${NDK_VERSION}"

      - name: Build futex reproduction PoC
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: bash scripts/ci-build-futex-poc.sh

      - name: Build IonStack preload
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: |
          make -C IonStack/CVE-2026-43499/exploit \
            API=${{ env.IONSTACK_ANDROID_API }} \
            PROJECT=${{ env.IONSTACK_PROJECT }} \
            info preload

      - name: Upload futex PoC artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostlock-poc-arm64
          path: build/ghostlock-poc-arm64
          if-no-files-found: error
          retention-days: 7

      - name: Upload IonStack preload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ionstack-preload-${{ env.IONSTACK_PROJECT }}
          path: IonStack/CVE-2026-43499/exploit/build/${{ env.IONSTACK_PROJECT }}/bin/preload.so
          if-no-files-found: error
          retention-days: 7
